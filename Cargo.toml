[package]
name = "dream-ini"
version = "0.1.0"
edition = "2024"
description = "Import Morrowind.ini settings into OpenMW configuration files"
license = "GPL-3.0-or-later"
readme = "README.md"
keywords = ["openmw", "morrowind", "ini", "config"]
categories = ["command-line-utilities", "config"]

[dependencies]
clap_complete = "4"
clap_mangen = "0.2"
clap = { version = "4", features = ["derive"] }
encoding_rs = "0.8"
mlua = { version = "0.10", optional = true, features = ["luajit52", "vendored"] }

[features]
lua = ["dep:mlua"]

[dev-dependencies]
criterion = "0.5"

[[bench]]
name = "round_trip"
harness = false
